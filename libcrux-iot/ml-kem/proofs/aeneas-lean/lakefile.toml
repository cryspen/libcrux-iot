name = "LibcruxIotMlKem"
version = "0.1.0"
defaultTargets = ["LibcruxIotMlKem"]

[[lean_lib]]
name = "LibcruxIotMlKem"

[[require]]
name = "Hax"
git = { url = "https://github.com/cryspen/hax-evit", subDir = "hax-lib/proof-libs/aeneas-lean" }
rev = "7b4bd97058e0fcbf9135b76297ca91942f2327a6"

[[require]]
name = "LibcruxSecrets"
path = "../../../../vendored/libcrux-secrets/proofs/aeneas-lean"

# Bring in HacspecSha3's Missing.lean for the shared `core_models.…`
# index / slice / range stubs (also used by the spec ml-kem tree).
[[require]]
name = "HacspecSha3"
path = "../../../../specs/sha3/proofs/aeneas-lean"

# Spec ML-KEM (hacspec-style extraction) — provides `Spec.ntt`,
# `Spec.multiply_ntts`, `Spec.lift_poly`, etc. used by Layer M's
# `BitMlKem.{Spec,Commute,StateIso,AlgEquiv}` and the Phase-5
# functional-correctness upgrades for L3.6/3.7/3.8 + L6.3.
[[require]]
name = "HacspecMlKem"
path = "../../../../specs/ml-kem/proofs/aeneas-lean"

# The full-crate ml-kem extraction (`mlkem*::*` start-from) pulls in
# hash_functions which references `libcrux_iot_sha3.{sha256,sha512,
# shake256}_ema` and `libcrux_iot_sha3.incremental.UnbufferedXofState`.
# Wire in the impl SHA-3 extraction tree.
[[require]]
name = "LibcruxIotSha3"
path = "../../../sha3/proofs/aeneas-lean"
