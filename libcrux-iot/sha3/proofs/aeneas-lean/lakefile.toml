name = "LibcruxIotSha3"
version = "0.1.0"
defaultTargets = ["LibcruxIotSha3"]

[[lean_lib]]
name = "LibcruxIotSha3"
globs = ["LibcruxIotSha3", "LibcruxIotSha3.+"]

[[require]]
name = "Hax"
git = { url = "https://github.com/cryspen/hax-evit", subDir = "hax-lib/proof-libs/aeneas-lean" }
rev = "7b4bd97058e0fcbf9135b76297ca91942f2327a6"

[[require]]
name = "HacspecSha3"
path = "../../../../specs/sha3/proofs/aeneas-lean"

# Provides the `libcrux_secrets.*` symbols (Classify/Declassify Blanket,
# CastOps for every integer pair, etc.) that the extracted Funs.lean
# references. Without this dep we'd have to hand-stub them in our local
# Missing.lean. The path points at the libcrux-secrets crate in the
# sister repo `libcrux-ml-kem-proofs`.
[[require]]
name = "LibcruxSecrets"
path = "../../../../vendored/libcrux-secrets/proofs/aeneas-lean"
