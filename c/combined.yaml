files:

  # Constant time ops
  - name: libcrux_iot_ct_ops
    inline_static: true
    api:
      - [libcrux_iot_ml_kem, constant_time_ops]

  # MLDSA: MISC NON-ARCHITECTURE SPECIFIC HEADERS
  - name: libcrux_iot_core
    inline_static: true
    private:
      patterns:
        - [core, "*"]
      monomorphizations_exact:
        - [ Eurydice_dst_ref_shared uint8_t size_t_x4]
        - [ Eurydice_dst_ref_shared uint8_t size_t_x2]
        - [ Eurydice_dst_ref uint8_t size_t_x4]
        - [ Eurydice_dst_ref uint8_t size_t_x2]
        - [ "Eurydice_slice uint8_t_x4" ]
        - [ "Eurydice_slice uint8_t_x2" ]
        - [ Eurydice, arr_88]
        - [ Eurydice, arr_910]
        - [ Eurydice, arr_6d]
        - [ core, result, unwrap_26_ab ]
        - [ core, result, Result_a4 ]
    api:
      - [Eurydice, "*"]

  # MLDSA: MISC NON-ARCHITECTURE SPECIFIC HEADERS
  - name: libcrux_iot_mldsa_core
    inline_static: true
    private:
      monomorphizations_of:
        - [libcrux_iot_ml_dsa, types, "*"]
      patterns:
        - [libcrux_iot_ml_dsa, types, "*" ]
      monomorphizations_exact:
        - [ core, result, Result_53 ]
        - [ core, result, Result_2e ]
        - [ core, result, Result_41 ]
        - [ core, result, Result_97 ]
        - [ core, result, Result_87 ]
        - [ core, result, Result_74 ]
        - [ core, result, Result_5c ]


  # SHA3 (no mention of libcrux_iot_mlkem in this section, please)
  # Portable SHA3
  - name: libcrux_iot_sha3_portable
    inline_static: true
    api:
      patterns:
        - [libcrux_iot_sha3, "*"]
        - [libcrux_iot_sha3, simd, portable, "*"]
        - [libcrux_iot_sha3, generic_keccak, portable, "*"]
        - [libcrux_iot_sha3, portable, "*"]
        - [libcrux_iot_sha3, generic_keccak, "*"]
        - [libcrux_iot_sha3, traits, "*"]
        - [libcrux_iot_sha3, generic_keccak, xof, "*"] # xof is only portable for now
      monomorphizations_of:
        - [libcrux_iot_sha3, simd, portable, "*"]
        - [libcrux_iot_sha3, generic_keccak, portable, "*"]
        - [libcrux_iot_sha3, generic_keccak, "*"]
        - [libcrux_iot_sha3, traits, "*"]
        - [libcrux_iot_sha3, portable, "*"]
        - [libcrux_iot_sha3, generic_keccak, xof, "*"]
      monomorphizations_using:
        - [libcrux_iot_sha3, simd, portable, "*"]
        - [libcrux_iot_sha3, generic_keccak, portable, "*"]
        - [libcrux_iot_sha3, generic_keccak, "*"]
        - [libcrux_iot_sha3, traits, "*"]
        - [libcrux_iot_sha3, portable, "*"]
        - [libcrux_iot_sha3, generic_keccak, xof, "*"]
      monomorphizations_exact:
        - [ Eurydice, arr_f8 ]
        - [ Eurydice, arr_6c ]

  # MLDSA-65
  - name: libcrux_iot_mldsa65_portable
    inline_static: true
    api:
      patterns:
        - [libcrux_iot_ml_dsa, "*"]
        - [libcrux_iot_ml_dsa, samplex4, portable, "*"]
        - [libcrux_iot_ml_dsa, simd, "*"]
        - [libcrux_iot_ml_dsa, hash_functions, portable, "*"]
        - [libcrux_iot_ml_dsa, ml_dsa_65, portable, "*"]
        - [libcrux_iot_ml_dsa, ml_dsa_generic, instantiations, portable, "*"]
      monomorphizations_of:
        - [libcrux_iot_ml_dsa, polynomial, "*" ]
        - [libcrux_iot_ml_dsa, simd, "*"]
        - [libcrux_iot_ml_dsa, hash_functions, portable, "*"]
        - [libcrux_iot_ml_dsa, ml_dsa_65, portable]
        - [libcrux_iot_ml_dsa, ml_dsa_generic, instantiations, portable, "*"]
      monomorphizations_using:
        - [libcrux_iot_ml_dsa, polynomial, "*" ]
        - [libcrux_iot_ml_dsa, simd, "*"]
        - [libcrux_iot_ml_dsa, hash_functions, portable, "*"]
        - [libcrux_iot_ml_dsa, ml_dsa_generic, instantiations, portable, "*"]
      monomorphizations_exact:
        - [libcrux_iot_ml_dsa, pre_hash, PreHashResult]
        - [core, result, Result_a8]
        - [core, option, Option_84]
        - [core, option, Option_e3]
        - [ core, result, Result_80 ]

  # MLKEM: MISC NON-ARCHITECTURE SPECIFIC HEADERS
  - name: libcrux_iot_mlkem_core
    inline_static: true
    api:
      - [libcrux_iot_ml_kem, constants ]
      - [libcrux_iot_sha3, generic_keccak, constants ]
      # FIXME: removing this trips an internal invariant
      - [ Eurydice, "*" ]
    private:
      monomorphizations_of:
        # - [core, "*"]
        - [libcrux_iot_secrets, "*"]
        # - [libcrux_iot_ml_kem, types, "*"]
        - [libcrux_iot_ml_kem, constant_time_ops, "*"]
        - [libcrux_iot_ml_kem, utils, "*" ]
      # monomorphizations_using:
        # - [libcrux_iot_ml_kem, types, "*"]
      patterns:
        # - [core, "*"]
        - [libcrux_iot_secrets, "*"]
        - [libcrux_iot_ml_kem, types, "*"]
        - [libcrux_iot_ml_kem, constant_time_ops, "*"]
        - [libcrux_iot_ml_kem, utils, "*" ]
      monomorphizations_exact:
        - [ Eurydice_dst_ref_shared uint8_t size_t_x4]
        - [ Eurydice_dst_ref_shared uint8_t size_t_x2]
        - [ Eurydice_dst_ref uint8_t size_t_x4]
        - [ Eurydice_dst_ref uint8_t size_t_x2]
        - [ "Eurydice_slice uint8_t_x4" ]
        - [ "Eurydice_slice uint8_t_x2" ]



  - name: libcrux_iot_mlkem768_portable
    inline_static: true
    api:
      patterns:
        - [libcrux_iot_ml_kem, mlkem768, "*"]
      monomorphizations_of:
        - [libcrux_iot_ml_kem, mlkem768, portable]
    private:
      exact:
        - [ libcrux_iot_ml_kem, variant, MlKem ]
        - [ libcrux_iot_ml_kem, variant, Kyber ]
      patterns:
        - [libcrux_iot_ml_kem, "*"]
        - [libcrux_iot_ml_kem, vector, "*"]
        - [libcrux_iot_ml_kem, hash_functions, portable, "*"]
        - [libcrux_iot_ml_kem, mlkem768, portable, "*"]
        - [libcrux_iot_ml_kem, ind_cca, instantiations, portable, "*"]
      monomorphizations_of:
        - [libcrux_iot_ml_kem, types, "*"]
        - [libcrux_iot_ml_kem, polynomial, "*" ]
        - [libcrux_iot_ml_kem, vector, "*"]
        - [libcrux_iot_ml_kem, hash_functions, portable, "*"]
        - [libcrux_iot_ml_kem, mlkem768, portable]
        - [libcrux_iot_ml_kem, ind_cca, instantiations, portable, "*"]
      monomorphizations_using:
        - [libcrux_iot_ml_kem, types, "*"]
        - [libcrux_iot_ml_kem, polynomial, "*" ]
        - [libcrux_iot_ml_kem, vector, "*"]
        - [libcrux_iot_ml_kem, hash_functions, portable, "*"]
        - [libcrux_iot_ml_kem, ind_cca, instantiations, portable, "*"]
    internal:
      - [libcrux_iot_ml_kem, mlkem768, portable, unpacked]
      
  # Catch-all for things that have not matched earlier
  - name: libcrux_iot_core
    inline_static: true
    private:
      monomorphizations_of:
        - [core, "*"]
        - [Eurydice, "*" ]
      patterns:
        - [core, "*"]
        - [Eurydice, "*" ]
naming:
  skip_prefix:
    - [ core, core_arch, arm_shared, neon ]
    - [ core, core_arch, x86 ]
    - [ core, option ]
    - [ core, result ]
    - [ core, array ]
