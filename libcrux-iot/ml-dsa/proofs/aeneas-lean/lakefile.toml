name = "LibcruxIotMlDsa"
version = "0.1.0"
defaultTargets = ["LibcruxIotMlDsa"]

[[lean_lib]]
name = "LibcruxIotMlDsa"

[[require]]
name = "Hax"
git = { url = "https://github.com/cryspen/hax-evit", subDir = "hax-lib/proof-libs/aeneas-lean" }
rev = "ffdf432705d409b62ec025d253a340234b59766f"

# Spec-extraction campaign: the machine-EXTRACTED clean-Z_q ML-DSA hacspec
# (crate `hacspec_ml_dsa`, `~/libcrux-ml-dsa-proofs/specs/ml-dsa/`). The
# poly-layer FCs re-target `hacspec_ml_dsa.{ntt,polynomial,arithmetic}.*` so
# the hand-written `LibcruxIotMlDsa/Spec/Pure.lean` is no longer the trusted
# standalone reference (it remains a proven-equal intermediate). HacspecMlDsa
# pins the SAME Hax rev (ffdf432) as above, so the dependency graphs unify.
#
# LOCAL-DEV form (`path =`): assumes both repos are checked out as siblings
# under the same parent dir. Switch to the `git = {url, subDir, rev}` form
# (mirroring ml-kem's `HacspecMlKem`) once the spec repo is pushed.
[[require]]
name = "HacspecMlDsa"
path = "../../../../../libcrux-ml-dsa-proofs/specs/ml-dsa/proofs/aeneas-lean"
