name = "LibcruxIotMlDsa"
version = "0.1.0"
defaultTargets = ["LibcruxIotMlDsa"]

[[lean_lib]]
name = "LibcruxIotMlDsa"

[[require]]
name = "Hax"
git = { url = "https://github.com/cryspen/hax-evit", subDir = "hax-lib/proof-libs/aeneas-lean" }
rev = "ffdf432705d409b62ec025d253a340234b59766f"

# The machine-extracted clean-Z_q ML-DSA hacspec (crate `hacspec_ml_dsa`,
# `specs/ml-dsa/` in cryspen/libcrux). The poly-layer FCs reference
# `hacspec_ml_dsa.{ntt,polynomial,arithmetic}.*` (see
# `LibcruxIotMlDsa/Spec/HacspecBridge.lean`). It pins the same Hax rev (ffdf432)
# as above, so the dependency graphs unify.
[[require]]
name = "HacspecMlDsa"
git = { url = "https://github.com/cryspen/libcrux", subDir = "specs/ml-dsa/proofs/aeneas-lean" }
rev = "e17b91789337650666e3dea86a1e42abb32919a4"
